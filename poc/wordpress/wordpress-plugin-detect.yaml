id: wordpress-plugin-detect

info:
  name: Wordpress Plugin Detection
  author: s4e-io
  severity: info
  description: |
    Detects installed WordPress plugins by analyzing HTTP responses and common plugin paths
  reference:
    - https://wordpress.org/plugins/
  metadata:
    max-request: 1
    shodan-query:
      - http.component:"wordpress"
  tags: tech,wp,wordpress,plugin,detection,wp-plugin,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2
    matchers-condition: or
    matchers:
      - type: dsl
        name: elementor
        dsl:
          - 'regex("/plugins/elementor/", body)'
          - 'status_code == 200'
        condition: and

      - type: dsl
        name: contact-form-7
        dsl:
          - 'regex("/plugins/contact-form-7/", body)'
          - 'status_code == 200'
        condition: and

      - type: dsl
